name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Если твоя ветка называется master, замени main на master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        # Здесь мы берем секрет из настроек репозитория и передаем его в Vite
        env:
          VITE_WEATHER_KEY: ${{ secrets.VITE_WEATHER_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite собирает проект в папку dist по умолчанию
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

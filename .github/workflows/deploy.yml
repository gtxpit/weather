name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # или master, проверьте имя вашей ветки

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        # Вот здесь магия: GitHub берет секрет и отдает его Vite
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite по умолчанию собирает в папку dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
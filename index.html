<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weather</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="/public/cloudy.png">.
</head>

<body>
  <div class="container">
    <a href="/" class="home-button">Home Page</a>
    <div class="history">
      <h2>Favorite city</h2>
    </div>
    <h1>Weather</h1>
    <div class="input">
      <button class="addForever">★</button>
      <input type="text" placeholder="Enter your city">
      <input type="button" value="✓">
    </div>
    <div class="result">
      <img id="weatherIcon">
      <div id="weatherText"></div>
    </div>
    <div class="forecast">
      <div id="forecastCards" class="forecast-cards"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
